name: Node CI

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "20"
      coverage-lines-threshold:
        description: "Minimum statement/line coverage percentage required for the test step."
        type: number
        default: 80
      coverage-functions-threshold:
        description: "Minimum function coverage percentage required for the test step."
        type: number
        default: 80
      coverage-branches-threshold:
        description: "Minimum branch coverage percentage required for the test step."
        type: number
        default: 80
      coverage-statements-threshold:
        description: "Minimum statement coverage percentage required for the test step."
        type: number
        default: 80

concurrency:
  group: ${{ github.repository }}-node-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --exit-code 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Dependency audit
        run: npm audit --audit-level=high

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep
        run: |
          pip3 install --quiet semgrep
          semgrep scan \
              --config p/javascript \
              --config p/typescript \
              --config p/security-audit \
              --config p/owasp-top-ten \
              --error --quiet .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  quality:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Lint
        run: |
          if [ -f "biome.json" ] || [ -f "biome.jsonc" ]; then
            npx biome check .
          else
            npx eslint .
          fi

      - name: Type check
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          fi

      - name: Test
        run: |
          if [ -f "vitest.config.ts" ] || [ -f "vitest.config.js" ] || [ -f "vitest.config.mts" ]; then
            npx vitest run --coverage \
              --coverage.thresholds.lines=${{ inputs.coverage-lines-threshold }} \
              --coverage.thresholds.functions=${{ inputs.coverage-functions-threshold }} \
              --coverage.thresholds.branches=${{ inputs.coverage-branches-threshold }} \
              --coverage.thresholds.statements=${{ inputs.coverage-statements-threshold }}
          elif grep -q '"jest"' package.json 2>/dev/null || [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage \
              --coverageThreshold='{"global":{"lines":${{ inputs.coverage-lines-threshold }},"functions":${{ inputs.coverage-functions-threshold }},"branches":${{ inputs.coverage-branches-threshold }},"statements":${{ inputs.coverage-statements-threshold }}}}'
          else
            npm test
          fi
