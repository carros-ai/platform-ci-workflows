name: Python Release

on:
  workflow_call:
    inputs:
      app-name:
        description: "Application name (used as Docker image name)"
        required: true
        type: string
      python-version:
        description: "Python version"
        type: string
        default: "3.11"
      release:
        description: "Create semver release — true on merge to main, false on skill deploy"
        type: boolean
        default: false
      health-check-url:
        description: "URL to hit after deploy to confirm the service is up (e.g. https://myapp.carros-ai.online/health). Skip if empty."
        type: string
        default: ""
    secrets:
      COOLIFY_WEBHOOK_URL:
        description: "Coolify deploy webhook URL for this service"
        required: true
      COOLIFY_DEPLOY_TOKEN:
        description: "Coolify API token with deploy permission"
        required: true
      WG_CI_CONFIG:
        description: "WireGuard client config (.conf file content) for the CI peer"
        required: true

concurrency:
  group: ${{ github.repository }}-${{ inputs.app-name }}-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Security and quality run in parallel ──────────────────────────────────

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --exit-code 1

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit

  quality:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check . && ruff format --check .

      - name: Type check
        run: |
          pip install mypy
          mypy . --ignore-missing-imports

      - name: Security lint
        run: |
          pip install bandit
          bandit -r . -ll --exclude ./.venv,./venv,./tests,./test

      - name: Test
        run: pytest --tb=short --cov --cov-fail-under=80

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep
        run: |
          pip3 install --quiet semgrep
          semgrep scan \
              --config p/python \
              --config p/security-audit \
              --config p/owasp-top-ten \
              --error --quiet .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  # ── Build after security + quality + sast pass ────────────────────────────

  build:
    name: Build & Push
    needs: [security, quality, sast]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create git tags
      packages: write  # push to ghcr.io
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version_full: ${{ steps.version.outputs.full }}
      version_minor: ${{ steps.version.outputs.minor }}
      version_major: ${{ steps.version.outputs.major }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        if: inputs.release
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Extract version parts
        id: version
        if: inputs.release
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "minor=$(echo $VERSION | cut -d. -f1-2)" >> $GITHUB_OUTPUT
          echo "major=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/carros-ai/${{ inputs.app-name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.version.outputs.full }},enable=${{ inputs.release }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ inputs.release }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ inputs.release }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Container scan after build ────────────────────────────────────────────

  scan:
    name: Container scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Container security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

  # ── Deploy after scan passes ──────────────────────────────────────────────

  deploy:
    name: Deploy
    needs: [build, scan]
    runs-on: ubuntu-latest
    environment: production  # enables GitHub Insights DORA metrics
    permissions:
      contents: write   # create GitHub release
      id-token: write   # Cosign OIDC keyless signing
      packages: write   # push Cosign signature to ghcr.io
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- SBOM ---

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      # --- Cosign: sign image (keyless via OIDC, no key management needed) ---

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}

      # --- GitHub Release (only on release: true) ---

      - name: Create GitHub Release
        if: inputs.release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.build.outputs.new_tag }}
          name: ${{ needs.build.outputs.new_tag }}
          generateReleaseNotes: true
          artifacts: sbom.spdx.json

      # --- Deploy ---

      - name: Connect to VPN
        run: |
          sudo apt-get install -y wireguard-tools resolvconf
          echo "${{ secrets.WG_CI_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0

      - name: Deploy via Coolify
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEPLOY_TOKEN }}" \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}"

      - name: Disconnect from VPN
        if: always()
        run: sudo wg-quick down wg0

      - name: Smoke test
        if: inputs.health-check-url != ''
        run: |
          curl -fsSL \
            --retry 10 \
            --retry-delay 15 \
            --retry-connrefused \
            "${{ inputs.health-check-url }}"
          echo "Service is healthy"
