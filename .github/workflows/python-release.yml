name: Python Release

on:
  workflow_call:
    inputs:
      app-name:
        description: "Application name (used as Docker image name)"
        required: true
        type: string
      python-version:
        description: "Python version"
        type: string
        default: "3.11"
      release:
        description: "Create semver release — true on merge to main, false on skill deploy"
        type: boolean
        default: false
      health-check-url:
        description: "URL to hit after deploy to confirm the service is up (e.g. https://myapp.carros-ai.online/health). Skip if empty."
        type: string
        default: ""
      audit-ignore:
        description: "Space-separated list of CVE/GHSA IDs to skip in pip-audit (use for upstream issues without a fix yet)."
        type: string
        default: ""
      coverage-fail-under:
        description: "Coverage threshold for pytest --cov-fail-under. Lower it temporarily when restoring large surfaces; raise back to 80 once unit coverage catches up."
        type: number
        default: 80
    secrets:
      COOLIFY_WEBHOOK_URL:
        description: "Coolify deploy webhook URL for this service"
        required: false
      COOLIFY_DEPLOY_TOKEN:
        description: "Coolify API token with deploy permission"
        required: false

concurrency:
  group: ${{ github.repository }}-${{ inputs.app-name }}-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Security and quality run in parallel ──────────────────────────────────

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --exit-code 1

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Configure git auth for private packages
        run: |
          TOKEN="${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          if [ -f "uv.lock" ]; then
            uv sync --all-extras
          else
            pip install -e ".[dev]"
          fi

      - name: Dependency audit
        env:
          AUDIT_IGNORE: ${{ inputs.audit-ignore }}
        run: |
          # Build --ignore-vuln args from the input list (one flag per ID).
          ignore_args=""
          for id in $AUDIT_IGNORE; do
            ignore_args="$ignore_args --ignore-vuln $id"
          done
          if [ -f "uv.lock" ]; then
            uv run pip-audit $ignore_args
          else
            pip install pip-audit
            pip-audit $ignore_args
          fi

  quality:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Configure git auth for private packages
        run: |
          TOKEN="${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          if [ -f "uv.lock" ]; then
            uv sync --all-extras
          else
            pip install -e ".[dev]"
          fi

      - name: Lint
        run: |
          if [ -f "uv.lock" ]; then
            uv run ruff check . && uv run ruff format --check .
          else
            ruff check . && ruff format --check .
          fi

      - name: Type check
        run: |
          if [ -f "uv.lock" ]; then
            uv run mypy . --ignore-missing-imports
          else
            pip install mypy
            mypy . --ignore-missing-imports
          fi

      - name: Security lint
        run: |
          if [ -f "uv.lock" ]; then
            uv run bandit -r . -ll --exclude ./.venv,./venv,./tests,./test
          else
            pip install bandit
            bandit -r . -ll --exclude ./.venv,./venv,./tests,./test
          fi

      - name: Test
        env:
          COV_FAIL_UNDER: ${{ inputs.coverage-fail-under }}
        run: |
          if [ -f "uv.lock" ]; then
            uv run pytest --tb=short --cov --cov-fail-under="$COV_FAIL_UNDER"
          else
            pytest --tb=short --cov --cov-fail-under="$COV_FAIL_UNDER"
          fi

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep
        run: |
          pip3 install --quiet semgrep
          semgrep scan \
              --config p/python \
              --config p/security-audit \
              --config p/owasp-top-ten \
              --error --quiet .

      - name: Filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  # ── Build after security + quality + sast pass ────────────────────────────

  build:
    name: Build & Push
    needs: [security, quality, sast]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create git tags
      packages: write  # push to ghcr.io
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version_full: ${{ steps.version.outputs.full }}
      version_minor: ${{ steps.version.outputs.minor }}
      version_major: ${{ steps.version.outputs.major }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        if: inputs.release
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Extract version parts
        id: version
        if: inputs.release
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "minor=$(echo $VERSION | cut -d. -f1-2)" >> $GITHUB_OUTPUT
          echo "major=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/carros-ai/${{ inputs.app-name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.version.outputs.full }},enable=${{ inputs.release }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ inputs.release }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ inputs.release }}

      # Free disk on the runner before the build. ML images bake in ONNX +
      # PyTorch + opencv + paddleocr + ~370MB of model weights and routinely
      # OOM-on-disk on the standard ubuntu-latest 14GB partition. Trims
      # ~25GB of preinstalled SDKs we never use.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                       /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

  # ── Container scan after build ────────────────────────────────────────────

  scan:
    name: Container scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Container security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

  # ── Deploy after scan passes ──────────────────────────────────────────────

  deploy:
    name: Deploy
    needs: [build, scan]
    runs-on: ubuntu-latest
    environment: production  # enables GitHub Insights DORA metrics
    env:
      HAS_COOLIFY_DEPLOY: ${{ secrets.COOLIFY_WEBHOOK_URL != '' && secrets.COOLIFY_DEPLOY_TOKEN != '' }}
    permissions:
      contents: write   # create GitHub release
      id-token: write   # Cosign OIDC keyless signing
      packages: write   # push Cosign signature to ghcr.io
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- SBOM ---

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      # --- Cosign: sign image (keyless via OIDC, no key management needed) ---

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}

      # --- GitHub Release (only on release: true) ---

      - name: Create GitHub Release
        if: inputs.release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.build.outputs.new_tag }}
          name: ${{ needs.build.outputs.new_tag }}
          generateReleaseNotes: true
          artifacts: sbom.spdx.json

      # --- Deploy ---

      - name: Skip Coolify deploy
        if: env.HAS_COOLIFY_DEPLOY != 'true'
        run: |
          echo "::warning::COOLIFY_WEBHOOK_URL or COOLIFY_DEPLOY_TOKEN is not configured; image was built and signed, but deploy was skipped."

      - name: Deploy via Coolify
        if: env.HAS_COOLIFY_DEPLOY == 'true'
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEPLOY_TOKEN }}" \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}"

      - name: Smoke test
        if: env.HAS_COOLIFY_DEPLOY == 'true' && inputs.health-check-url != ''
        run: |
          curl -fsSL \
            --retry 10 \
            --retry-delay 15 \
            --retry-connrefused \
            "${{ inputs.health-check-url }}"
          echo "Service is healthy"
