name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.11"

concurrency:
  group: ${{ github.repository }}-python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --exit-code 1

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Configure git auth for private packages
        run: |
          TOKEN="${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          if [ -f "uv.lock" ]; then
            uv sync --all-extras
          else
            pip install -e ".[dev]"
          fi

      - name: Dependency audit
        run: |
          if [ -f "uv.lock" ]; then
            uv run pip-audit
          else
            pip install pip-audit
            pip-audit
          fi

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep
        run: |
          pip3 install --quiet semgrep
          semgrep scan \
              --config p/python \
              --config p/security-audit \
              --config p/owasp-top-ten \
              --error --quiet .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  quality:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Configure git auth for private packages
        run: |
          TOKEN="${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          if [ -f "uv.lock" ]; then
            uv sync --all-extras
          else
            pip install -e ".[dev]"
          fi

      - name: Lint
        run: |
          if [ -f "uv.lock" ]; then
            uv run ruff check . && uv run ruff format --check .
          else
            ruff check . && ruff format --check .
          fi

      - name: Type check
        run: |
          if [ -f "uv.lock" ]; then
            uv run mypy . --ignore-missing-imports
          else
            pip install mypy
            mypy . --ignore-missing-imports
          fi

      - name: Security lint
        run: |
          if [ -f "uv.lock" ]; then
            uv run bandit -r . -ll --exclude ./.venv,./venv,./tests,./test
          else
            pip install bandit
            bandit -r . -ll --exclude ./.venv,./venv,./tests,./test
          fi

      - name: Test
        run: |
          if [ -f "uv.lock" ]; then
            uv run pytest --tb=short --cov --cov-fail-under=80
          else
            pytest --tb=short --cov --cov-fail-under=80
          fi
