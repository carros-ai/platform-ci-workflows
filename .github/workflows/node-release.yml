name: Node Release

on:
  workflow_call:
    inputs:
      app-name:
        description: "Application name (used as Docker image name)"
        required: true
        type: string
      node-version:
        description: "Node.js version"
        type: string
        default: "20"
      release:
        description: "Create semver release — true on merge to main, false on skill deploy"
        type: boolean
        default: false
    secrets:
      COOLIFY_WEBHOOK_URL:
        description: "Coolify deploy webhook URL for this service"
        required: true

jobs:
  release:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: |
          if [ -f "biome.json" ] || [ -f "biome.jsonc" ]; then
            npx biome check .
          else
            npx eslint .
          fi

      - name: Test
        run: npm test

      # --- semver (only on release: true) ---

      - name: Bump version and push tag
        id: tag
        if: inputs.release
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Extract version parts
        id: version
        if: inputs.release
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "minor=$(echo $VERSION | cut -d. -f1-2)" >> $GITHUB_OUTPUT
          echo "major=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT

      # --- Docker ---

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/carros-ai/${{ inputs.app-name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.version.outputs.full }},enable=${{ inputs.release }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ inputs.release }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ inputs.release }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- GitHub Release (only on release: true) ---

      - name: Create GitHub Release
        if: inputs.release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          generateReleaseNotes: true

      # --- Deploy ---

      - name: Deploy via Coolify
        run: curl -fsSL "${{ secrets.COOLIFY_WEBHOOK_URL }}"
