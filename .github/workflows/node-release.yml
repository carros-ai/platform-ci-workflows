name: Node Release

on:
  workflow_call:
    inputs:
      app-name:
        description: "Application name (used as Docker image name)"
        required: true
        type: string
      node-version:
        description: "Node.js version"
        type: string
        default: "20"
      release:
        description: "Create semver release — true on merge to main, false on skill deploy"
        type: boolean
        default: false
      health-check-url:
        description: "URL to hit after deploy to confirm the service is up (e.g. https://myapp.carros-ai.online/health). Skip if empty."
        type: string
        default: ""
      coverage-lines-threshold:
        description: "Minimum statement/line coverage percentage required for the test step."
        type: number
        default: 80
      coverage-functions-threshold:
        description: "Minimum function coverage percentage required for the test step."
        type: number
        default: 80
      coverage-branches-threshold:
        description: "Minimum branch coverage percentage required for the test step."
        type: number
        default: 80
      coverage-statements-threshold:
        description: "Minimum statement coverage percentage required for the test step."
        type: number
        default: 80
      build-args:
        description: "Multiline KEY=VALUE pairs forwarded to docker/build-push-action as --build-arg. Use for NEXT_PUBLIC_* in Next.js apps that must be inlined at build time."
        type: string
        default: ""
    secrets:
      COOLIFY_WEBHOOK_URL:
        description: "Coolify deploy webhook URL for this service"
        required: false
      COOLIFY_DEPLOY_TOKEN:
        description: "Coolify API token with deploy permission"
        required: false

concurrency:
  group: ${{ github.repository }}-${{ inputs.app-name }}-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Security and quality run in parallel ──────────────────────────────────

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --exit-code 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Dependency audit
        run: npm audit --audit-level=high

  quality:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install
        run: npm ci
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Lint
        run: |
          if [ -f "biome.json" ] || [ -f "biome.jsonc" ]; then
            npx biome check .
          else
            npx eslint .
          fi

      - name: Type check
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          fi

      - name: Test
        run: |
          if [ -f "vitest.config.ts" ] || [ -f "vitest.config.js" ] || [ -f "vitest.config.mts" ]; then
            npx vitest run --coverage \
              --coverage.thresholds.lines=${{ inputs.coverage-lines-threshold }} \
              --coverage.thresholds.functions=${{ inputs.coverage-functions-threshold }} \
              --coverage.thresholds.branches=${{ inputs.coverage-branches-threshold }} \
              --coverage.thresholds.statements=${{ inputs.coverage-statements-threshold }}
          elif grep -q '"jest"' package.json 2>/dev/null || [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage \
              --coverageThreshold='{"global":{"lines":${{ inputs.coverage-lines-threshold }},"functions":${{ inputs.coverage-functions-threshold }},"branches":${{ inputs.coverage-branches-threshold }},"statements":${{ inputs.coverage-statements-threshold }}}}'
          else
            npm test
          fi

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep
        run: |
          pip3 install --quiet semgrep
          semgrep scan \
              --config p/javascript \
              --config p/typescript \
              --config p/security-audit \
              --config p/owasp-top-ten \
              --error --quiet .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  # ── Build after security + quality + sast pass ────────────────────────────

  build:
    name: Build & Push
    needs: [security, quality, sast]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create git tags
      packages: write  # push to ghcr.io
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version_full: ${{ steps.version.outputs.full }}
      version_minor: ${{ steps.version.outputs.minor }}
      version_major: ${{ steps.version.outputs.major }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        if: inputs.release
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Extract version parts
        id: version
        if: inputs.release
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "minor=$(echo $VERSION | cut -d. -f1-2)" >> $GITHUB_OUTPUT
          echo "major=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/carros-ai/${{ inputs.app-name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.version.outputs.full }},enable=${{ inputs.release }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ inputs.release }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ inputs.release }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            npm_token=${{ secrets.GH_TOKEN }}

  # ── Container scan after build ────────────────────────────────────────────

  scan:
    name: Container scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Container security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

  # ── Deploy after scan passes ──────────────────────────────────────────────

  deploy:
    name: Deploy
    needs: [build, scan]
    runs-on: ubuntu-latest
    environment: production  # enables GitHub Insights DORA metrics
    env:
      HAS_COOLIFY_DEPLOY: ${{ secrets.COOLIFY_WEBHOOK_URL != '' && secrets.COOLIFY_DEPLOY_TOKEN != '' }}
    permissions:
      contents: write   # create GitHub release
      id-token: write   # Cosign OIDC keyless signing
      packages: write   # push Cosign signature to ghcr.io
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- SBOM ---

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      # --- Cosign: sign image (keyless via OIDC, no key management needed) ---

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}

      # --- GitHub Release (only on release: true) ---

      - name: Create GitHub Release
        if: inputs.release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.build.outputs.new_tag }}
          name: ${{ needs.build.outputs.new_tag }}
          generateReleaseNotes: true
          artifacts: sbom.spdx.json

      # --- Deploy ---

      - name: Skip Coolify deploy
        if: env.HAS_COOLIFY_DEPLOY != 'true'
        run: |
          echo "::warning::COOLIFY_WEBHOOK_URL or COOLIFY_DEPLOY_TOKEN is not configured; image was built and signed, but deploy was skipped."

      - name: Deploy via Coolify
        if: env.HAS_COOLIFY_DEPLOY == 'true'
        # &force=true bypasses Coolify's image-pull cache. Without it,
        # back-to-back deploys can serve a stale `:latest` tag because
        # Coolify decides the local image hash matches and skips the pull —
        # discovered when autohub-web's NEXT_PUBLIC_* env fix wouldn't
        # land in the running container until a forced redeploy. See
        # platform/operations/coolify-deploy.md § Force-pull on deploy.
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEPLOY_TOKEN }}" \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}&force=true"

      - name: Smoke test
        if: env.HAS_COOLIFY_DEPLOY == 'true' && inputs.health-check-url != ''
        run: |
          curl -fsSL \
            --retry 10 \
            --retry-delay 15 \
            --retry-connrefused \
            "${{ inputs.health-check-url }}"
          echo "Service is healthy"
