name: PR Agent (Claude)

on:
  workflow_call:
    secrets:
      ANTHROPIC_KEY:
        required: true

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr_agent:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    name: PR Agent Review
    steps:
      - name: PR Agent
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC.KEY: ${{ secrets.ANTHROPIC_KEY }}
          config.model: "anthropic/claude-sonnet-4-6"
          config.model_turbo: "anthropic/claude-sonnet-4-6"
          config.fallback_models: '["anthropic/claude-haiku-4-5-20251001"]'
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          pr_reviewer.require_focused_review: "true"
          pr_reviewer.extra_instructions: |
            - Focus on bugs, security, and performance.
            - Flag code smells and clean code violations.
            - Suggest concrete improvements with code.
          pr_description.publish_labels: "true"
          pr_code_suggestions.num_code_suggestions: "4"
          pr_code_suggestions.extra_instructions: |
            Focus on readability, performance, and security improvements.
          config.ignore_pr_files: >-
            ["**/package-lock.json",
             "**/yarn.lock",
             "**/pnpm-lock.yaml",
             "**/*.min.js",
             "**/*.min.css",
             "**/*.map",
             "**/*.generated.*",
             "**/dist/**",
             "**/build/**",
             "**/node_modules/**"]
