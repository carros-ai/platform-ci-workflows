name: Go CI

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version"
        type: string
        default: "1.24"

concurrency:
  group: ${{ github.repository }}-go-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/carros-ai/*
      GONOSUMDB: github.com/carros-ai/*
    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --exit-code 1

      - name: Configure git auth for private modules
        run: |
          TOKEN="${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Vulnerability scan
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ inputs.go-version }}
          go-package: ./...

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep
        run: |
          pip3 install --quiet semgrep
          semgrep scan \
              --config p/golang \
              --config p/security-audit \
              --config p/owasp-top-ten \
              --error --quiet .

      - name: Filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  quality:
    name: Test & Lint
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/carros-ai/*
      GONOSUMDB: github.com/carros-ai/*
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Configure git auth for private modules
        run: |
          TOKEN="${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Security check
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Coverage check
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < 80)}"; then
            echo "::error::Coverage ${COVERAGE}% is below threshold 80%"
            exit 1
          fi
