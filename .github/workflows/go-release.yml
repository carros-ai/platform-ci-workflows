name: Go Release

on:
  workflow_call:
    inputs:
      app-name:
        description: "Application name (used as Docker image name)"
        required: true
        type: string
      go-version:
        description: "Go version"
        type: string
        default: "1.24"
      release:
        description: "Create semver release — true on merge to main, false on skill deploy"
        type: boolean
        default: false
      health-check-url:
        description: "URL to hit after deploy to confirm the service is up (e.g. https://myapp.carros-ai.online/health). Skip if empty."
        type: string
        default: ""
      coverage-threshold:
        description: "Minimum total test coverage percentage"
        type: number
        default: 80
    secrets:
      COOLIFY_WEBHOOK_URL:
        description: "Coolify deploy webhook URL for this service"
        required: false
      COOLIFY_DEPLOY_TOKEN:
        description: "Coolify API token with deploy permission"
        required: false
      GH_TOKEN:
        description: "GitHub token for accessing private Go modules (GOPRIVATE). Falls back to GITHUB_TOKEN if not set."
        required: false

concurrency:
  group: ${{ github.repository }}-${{ inputs.app-name }}-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Security and quality run in parallel ──────────────────────────────────

  security:
    name: Security
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/carros-ai/*
      GONOSUMDB: github.com/carros-ai/*
    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --exit-code 1

      - name: Configure git auth for private modules
        run: |
          TOKEN="${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Vulnerability scan
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ inputs.go-version }}
          go-package: ./...

  quality:
    name: Test & Lint
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/carros-ai/*
      GONOSUMDB: github.com/carros-ai/*
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Configure git auth for private modules
        run: |
          TOKEN="${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Security check
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Coverage check
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          THRESHOLD="${{ inputs.coverage-threshold }}"
          echo "Coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < $THRESHOLD)}"; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep
        run: |
          pip3 install --quiet semgrep
          semgrep scan \
              --config p/golang \
              --config p/security-audit \
              --config p/owasp-top-ten \
              --error --quiet .

      - name: Filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  # ── Build after security + quality + sast pass ────────────────────────────

  build:
    name: Build & Push
    needs: [security, quality, sast]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create git tags
      packages: write  # push to ghcr.io
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      new_tag: ${{ steps.tag.outputs.new_tag }}
      version_full: ${{ steps.version.outputs.full }}
      version_minor: ${{ steps.version.outputs.minor }}
      version_major: ${{ steps.version.outputs.major }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for semver tag calculation

      - name: Bump version and push tag
        id: tag
        if: inputs.release
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Extract version parts
        id: version
        if: inputs.release
        run: |
          VERSION="${{ steps.tag.outputs.new_version }}"
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "minor=$(echo $VERSION | cut -d. -f1-2)" >> $GITHUB_OUTPUT
          echo "major=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/carros-ai/${{ inputs.app-name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.version.outputs.full }},enable=${{ inputs.release }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ inputs.release }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ inputs.release }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

  # ── Container scan after build ────────────────────────────────────────────

  scan:
    name: Container scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Container security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

  # ── Deploy after scan passes ──────────────────────────────────────────────

  deploy:
    name: Deploy
    needs: [build, scan]
    runs-on: ubuntu-latest
    environment: production  # enables GitHub Insights DORA metrics
    permissions:
      contents: write   # create GitHub release
      id-token: write   # Cosign OIDC keyless signing
      packages: write   # push Cosign signature to ghcr.io
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- SBOM ---

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      # --- Cosign: sign image (keyless via OIDC, no key management needed) ---

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/carros-ai/${{ inputs.app-name }}@${{ needs.build.outputs.digest }}

      # --- GitHub Release (only on release: true) ---

      - name: Create GitHub Release
        if: inputs.release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.build.outputs.new_tag }}
          name: ${{ needs.build.outputs.new_tag }}
          generateReleaseNotes: true
          artifacts: sbom.spdx.json

      # --- Deploy ---

      - name: Deploy via Coolify
        env:
          WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          TOKEN: ${{ secrets.COOLIFY_DEPLOY_TOKEN }}
        if: env.WEBHOOK != '' && env.TOKEN != ''
        # &force=true bypasses Coolify's image-pull cache. Without it,
        # back-to-back deploys can serve a stale `:latest` tag because
        # Coolify decides the local image hash matches and skips the pull —
        # discovered when autohub-web's NEXT_PUBLIC_* env fix wouldn't
        # land in the running container until a forced redeploy. See
        # platform/operations/coolify-deploy.md § Force-pull on deploy.
        run: |
          curl -fsSL -H "Authorization: Bearer $TOKEN" "${WEBHOOK}&force=true"

      - name: Smoke test
        env:
          WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          TOKEN: ${{ secrets.COOLIFY_DEPLOY_TOKEN }}
        if: env.WEBHOOK != '' && env.TOKEN != '' && inputs.health-check-url != ''
        run: |
          curl -fsSLk --retry 10 --retry-delay 15 --retry-connrefused \
            "${{ inputs.health-check-url }}"
          echo "Service is healthy"
